<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Addition</title>
</head>
<body>
    <script>
        var num1 = 3;
        var num2 = 5;
        var sum = num1 + num2;

        document.write("Sum of " + num1 + " and " + num2 + " is " + sum);

    </script>
    
     <script>
        var num1 = 3;
        var num2 = 5;
        var sub = num1 - num2;
        document.write("<br>Subtraction of " + num1 + " and " + num2 + " is " + sub);
        document.write("<br>Multiplication of " + num1 + " and " + num2 + " is " + (num1 * num2));
        document.write("<br>Division of " + num1 + " and " + num2 + " is " + (num1 / num2));
        document.write("<br>Modulus of " + num1 + " and " + num2 + " is " + (num1 % num2));
    </script>

    <script>
        var num;
        document.write("<br>Value after variable declaration is: " + num);
        num = 5;
        document.write("<br>Initial value: " + num);
        num++;
        document.write("<br>Value after increment is: " + num);
        num += 7;
        document.write("<br>Value after addition is: " + num);
        num--;
        document.write("<br>Value after decrement is: " + num);
        var remainder = num % 3;
        document.write("<br>The remainder is: " + remainder);
    </script>

       <script>
        var radius = 20;
        var circumference = 2 * Math.PI * radius;
        var area = Math.PI * radius * radius;

        document.write("<br><h2>The Geometrizer</h2>");
        document.write("Radius of a circle: " + radius);
        document.write("<br>The circumference is: " + circumference);
        document.write("<br>The area is: " + area);
    </script>

    <script>
        var snack = "Chocolate Chip";
        var currentAge = 15;
        var maxAge = 65;
        var amountPerDay = 3;
        var totalNeeded = (maxAge - currentAge) * 365 * amountPerDay;

        document.write("<br><h2>The Lifetime Supply Calculator</h2>");
        document.write("Favourite Snack: " + snack);
        document.write("<br>Current Age: " + currentAge);
        document.write("<br>Estimated Maximum Age: " + maxAge);
        document.write("<br>Amount of snacks per day: " + amountPerDay);
        document.write("<br>You will need " + totalNeeded + " " + snack + " to last you until the ripe old age of " + maxAge);
    </script>

    <script>
        var ticketPrice = 600;
        var totalCost = ticketPrice * 5;
        document.write("<br>Total cost to buy 5 tickets to a movie is " + totalCost + " PKR");
    </script>

    <script>
        var num = 4;
        document.write("<br>Table of " + num + "<br>");
        for (var i = 1; i <= 10; i++) {
            document.write(num + " x " + i + " = " + (num * i) + "<br>");
        }
    </script>

    <script>
        var celsius = 25;
        var fahrenheit = (celsius * 9/5) + 32;
        document.write("<br>" + celsius + "°C is " + fahrenheit + "°F");

        fahrenheit = 70;
        celsius = (fahrenheit - 32) * 5/9;
        document.write("<br>" + fahrenheit + "°F is " + celsius + "°C");
    </script>

    <script>
        var item1Price = 650;
        var item2Price = 100;
        var item1Quantity = 3;
        var item2Quantity = 7;
        var shippingCharges = 100;

        var totalCost = (item1Price * item1Quantity) + (item2Price * item2Quantity) + shippingCharges;
        document.write("<br><h2>Shopping Cart</h2>");
        document.write("Price of item 1 is " + item1Price);
        document.write("<br>Quantity of item 1 is " + item1Quantity);
        document.write("<br>Price of item 2 is " + item2Price);
        document.write("<br>Quantity of item 2 is " + item2Quantity);
        document.write("<br>Shipping Charges " + shippingCharges);
        document.write("<br><br>Total cost of your order is " + totalCost);
    </script>

    <script>
        var totalMarks = 980;
        var marksObtained = 804;
        var percentage = (marksObtained / totalMarks) * 100;

        document.write("<br><h2>Marks Sheet</h2>");
        document.write("Total Marks: " + totalMarks);
        document.write("<br>Marks Obtained: " + marksObtained);
        document.write("<br>Percentage: " + percentage + "%");
    </script>

    <script>
        var usDollars = 10;
        var saudiRiyals = 25;
        var totalInPKR = (usDollars * 104.80) + (saudiRiyals * 28);
        document.write("<br><h2>Currency in PKR</h2>");
        document.write("Total Currency in PKR: " + totalInPKR);
    </script>

    <script>
        var num = 10;
        document.write("<br>Result:<br>The value of num is: " + num);
        document.write("<br><br>The value of ++num is: " + (++num));
        document.write("<br>Now the value of num is: " + num);
        document.write("<br><br>The value of num++ is: " + (num++));
        document.write("<br>Now the value of num is: " + num);
        document.write("<br><br>The value of --num is: " + (--num));
        document.write("<br>Now the value of num is: " + num);
        document.write("<br><br>The value of num-- is: " + (num--));
        document.write("<br>Now the value of num is: " + num);  
    </script>

    <script>
        var num = 2;
        var result = ((num + 5) * 10) / 2;
        document.write("<br><br>Result of the expression is: " + result);       
    </script>

    <script>
        var currentYear = 2026;
        var birthYear = 2008;
        var age = currentYear - birthYear;
        document.write("<br><h2>Age Calculator</h2>");
        document.write("Current Year: " + currentYear);
        document.write("<br>Birth Year: " + birthYear);
        document.write("<br>Your Age is: " + age);
    </script>


</body>
</html>
